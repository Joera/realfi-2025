services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: s3ntiment
    ports:
      - "8088:8080"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./data:/app/.data
    networks:
      - nillion-network

networks:
  nillion-network:
    driver: bridge